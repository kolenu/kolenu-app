# This file configures the analyzer, which statically analyzes Dart code to check for errors,
# warnings, and lints.

include: package:flutter_lints/flutter.yaml

analyzer:
  # Treat warnings as errors to force yourself to fix them before committing
  errors:
    unused_local_variable: error
    unused_import: error
    dead_code: error
    todo: info

linter:
  rules:
    # --- Error Prevention ---
    - avoid_print # Don't leave debug prints in production code
    - avoid_void_async # Ensure async functions return a Future
    - cancel_subscriptions # Prevent memory leaks in Streams
    - close_sinks # Prevent memory leaks in Controllers
    - no_logic_in_create_state # Keep logic out of State objects

    # --- Performance ---
    - prefer_const_constructors # Reduces widget rebuilds significantly
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables

    # --- Style & Consistency ---
    - always_declare_return_types # Makes code easier to read for others
    - prefer_final_locals # Encourages immutability
    - sort_child_properties_last # Standardizes widget code layout
    - unawaited_futures # Ensures you don't forget to 'await' or handle errors
