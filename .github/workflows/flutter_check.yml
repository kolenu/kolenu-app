name: Flutter Quality Check

# This trigger ensures the check runs every time you open or update a PR
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      # Setup the Flutter environment
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Speeds up future runs

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # The most important part: The Analysis
      - name: Run Flutter Analyze
        # If flutter analyze finds any issues, the PR will fail (red X)
        run: flutter analyze

      # Optional: Run unit tests as well
      - name: Run Tests
        run: flutter test

      # Enforce Dart formatting (This option is less important.)
      #- name: Check Dart formatting
      #  run: dart format --set-exit-if-changed .
